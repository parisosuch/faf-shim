services:
  api:
    build: ./api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - db_data:/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/faf-shim.db
    env_file:
      - path: ./api/.env
        required: false

  web:
    build:
      context: ./client
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api

volumes:
  db_data:
